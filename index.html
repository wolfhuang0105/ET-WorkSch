
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}
.app-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:4px}
.hint{font-size:12px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:10px;line-height:1.6}
textarea{width:100%;min-height:160px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:12px;font-family:var(--font-mono);color:var(--color-text-primary);background:var(--color-background-secondary);resize:vertical;line-height:1.5}
textarea:focus{outline:none;border-color:var(--color-border-primary)}
.btn-row{display:flex;gap:8px;margin-top:10px;align-items:center}
button.primary{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 18px;font-size:14px;cursor:pointer;color:var(--color-text-primary)}
button.primary:hover{background:var(--color-background-secondary)}
button.ghost{background:transparent;border:none;font-size:13px;cursor:pointer;color:var(--color-text-secondary);padding:4px 0}
button.ghost:hover{color:var(--color-text-primary)}
#status{font-size:13px;margin-top:8px;min-height:18px}
.err{color:#A32D2D}.ok{color:#0F6E56}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.month-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.stat-row{display:flex;gap:8px;flex-wrap:wrap}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:5px 12px;font-size:12px;color:var(--color-text-secondary)}
.stat b{color:var(--color-text-primary);font-weight:500}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.75rem}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:1.25rem}
.cal-hdr{text-align:center;font-size:12px;color:var(--color-text-secondary);padding:4px 0;font-weight:500}
.cal-hdr.wk{color:#993C1D}
.day{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 5px 5px;cursor:pointer;min-height:62px;display:flex;flex-direction:column;gap:1px;background:var(--color-background-primary);transition:border-color .12s}
.day:hover{border-color:var(--color-border-primary)}
.day.sel{border:2px solid #378ADD!important}
.day.empty{border:none;background:transparent;cursor:default;min-height:0}
.day.t-hol{background:#FCEBEB}
.day.t-mkup{background:#FFF0E6}
.day.t-wknd{background:#FFF7F0}
.day.t-special{background:#F3F0FD}
.day.t-today{background:#EEF6FF;box-shadow:inset 0 0 0 1.5px #378ADD}
.dn{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.day.t-hol .dn{color:#A32D2D}.day.t-mkup .dn{color:#854F0B}
.day.t-wknd .dn{color:#993C1D}.day.t-special .dn{color:#534AB7}.day.t-today .dn{color:#185FA5}
.hlbl{font-size:9px;font-weight:500;line-height:1.3}
.h{color:#A32D2D}.m{color:#993C1D}.s{color:#534AB7}.td{color:#185FA5}
.dcnt{font-size:10px;color:var(--color-text-secondary);margin-top:auto}
.dbar{height:3px;border-radius:2px;margin-top:3px}
.detail{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.dtitle{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:.75rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.bh{background:#FCEBEB;color:#A32D2D}.bm{background:#FFF0E6;color:#854F0B}
.bs{background:#EEEDFE;color:#3C3489}.bt{background:#E6F1FB;color:#185FA5}.bw{background:#FFF7F0;color:#993C1D}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.pcard{display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.pn{font-size:12px;color:var(--color-text-primary)}.pe{font-size:11px;color:var(--color-text-secondary)}
.empty-st{font-size:13px;color:var(--color-text-secondary);text-align:center;padding:2rem 0}
</style>

<div class="wrap">
<div id="view-input">
  <div class="app-title">班表產生器</div>
  <div class="sub">從 Excel 直接框選整份班表 → Ctrl+C → 在下方貼上 → 點「產生」</div>
  <div class="hint">⚠️ 請直接從 <b>Excel</b> 複製（Tab 分隔格式），不要先貼到記事本或 Word 再轉貼。<br>若格式正確，貼入後文字間應有空格或 Tab 分隔。</div>
  <textarea id="paste-area" placeholder="在此貼上 Excel 班表…"></textarea>
  <div class="btn-row">
    <button class="primary" onclick="parseSchedule()">產生當月班表</button>
  </div>
  <div id="status"></div>
</div>

<div id="view-cal" style="display:none">
  <div class="top-bar">
    <span class="month-title" id="cal-title"></span>
    <div class="stat-row" id="stats"></div>
    <button class="ghost" onclick="goBack()" style="margin-left:auto">← 重新貼上</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#FCEBEB;border:0.5px solid #F7C1C1"></div>國定假日</div>
    <div class="leg"><div class="leg-dot" style="background:#FFF0E6;border:0.5px solid #FAC775"></div>補假</div>
    <div class="leg"><div class="leg-dot" style="background:#FFF7F0;border:0.5px solid #F5C4B3"></div>週末</div>
    <div class="leg"><div class="leg-dot" style="background:#F3F0FD;border:0.5px solid #AFA9EC"></div>特殊紀念日</div>
    <div class="leg"><div class="leg-dot" style="background:#EEF6FF;border:0.5px solid #B5D4F4"></div>今日</div>
  </div>
  <div class="calendar" id="cal"></div>
  <div class="detail" id="detail"><div class="empty-st">點選日期查看當天出勤人員</div></div>
</div>
</div>

<script>
const AV_PAL=[
  {bg:"#E6F1FB",tc:"#0C447C"},{bg:"#E1F5EE",tc:"#085041"},{bg:"#EEEDFE",tc:"#3C3489"},
  {bg:"#FBEAF0",tc:"#72243E"},{bg:"#FAEEDA",tc:"#633806"},{bg:"#FAECE7",tc:"#993C1D"},
  {bg:"#EAF3DE",tc:"#27500A"},{bg:"#F3F0FD",tc:"#534AB7"},{bg:"#FCE4D6",tc:"#712B13"},
  {bg:"#E1F5EE",tc:"#0F6E56"},{bg:"#FBEAF0",tc:"#993556"},{bg:"#F1EFE8",tc:"#444441"},
];

const FIXED={'1-1':{t:'h',l:'元旦'},'2-14':{t:'s',l:'情人節'},'2-28':{t:'h',l:'和平紀念日'},
  '3-8':{t:'s',l:'婦女節'},'4-4':{t:'h',l:'兒童節'},'5-1':{t:'h',l:'勞動節'},
  '8-8':{t:'s',l:'父親節'},'9-28':{t:'s',l:'教師節'},'10-10':{t:'h',l:'國慶日'},
  '12-24':{t:'s',l:'平安夜'},'12-25':{t:'h',l:'聖誕/行憲'},'12-31':{t:'s',l:'跨年夜'}};
const QINGMING={2024:4,2025:4,2026:5,2027:5,2028:4};
const LUNAR={
  2025:{'1-27':{t:'h',l:'除夕'},'1-28':{t:'h',l:'初一'},'1-29':{t:'h',l:'初二'},'1-30':{t:'h',l:'初三'},'1-31':{t:'h',l:'初四'},'5-31':{t:'h',l:'端午節'},'10-6':{t:'h',l:'中秋節'}},
  2026:{'2-16':{t:'h',l:'除夕'},'2-17':{t:'h',l:'初一'},'2-18':{t:'h',l:'初二'},'2-19':{t:'h',l:'初三'},'2-20':{t:'h',l:'初四'},'2-21':{t:'h',l:'初五'},'6-19':{t:'h',l:'端午節'},'9-25':{t:'h',l:'中秋節'}},
  2027:{'2-5':{t:'h',l:'除夕'},'2-6':{t:'h',l:'初一'},'2-7':{t:'h',l:'初二'},'2-8':{t:'h',l:'初三'},'2-9':{t:'h',l:'初四'},'2-10':{t:'h',l:'初五'},'5-20':{t:'h',l:'端午節'},'10-3':{t:'h',l:'中秋節'}},
};
const MAKEUP={'2026-4':{'3':{t:'m',l:'兒童節補假'},'6':{t:'m',l:'清明補假'}},'2026-10':{'9':{t:'m',l:'國慶補假'}},'2025-1':{'31':{t:'m',l:'元旦補假'}},'2026-2':{'13':{t:'m',l:'春節補假'},'23':{t:'m',l:'春節補假'}}};

function nthSunday(year,month,n){const d=new Date(year,month-1,1);while(d.getDay()!==0)d.setDate(d.getDate()+1);d.setDate(d.getDate()+(n-1)*7);return d.getDate();}
const QIXI={2025:[8,29],2026:[8,19],2027:[8,9]};

function getHolidayMeta(year,month){
  const r={};
  Object.entries(FIXED).forEach(([k,v])=>{const[m,d]=k.split('-').map(Number);if(m===month)r[d]=v;});
  if(month===4){const q=QINGMING[year]||5;if(!r[q])r[q]={t:'h',l:'清明節'};}
  if(month===5){const ms=nthSunday(year,5,2);if(!r[ms])r[ms]={t:'s',l:'母親節'};}
  if(QIXI[year]&&QIXI[year][0]===month){const qd=QIXI[year][1];if(!r[qd])r[qd]={t:'s',l:'七夕情人節'};}
  if(LUNAR[year])Object.entries(LUNAR[year]).forEach(([k,v])=>{const[m,d]=k.split('-').map(Number);if(m===month)r[d]=v;});
  const mk=MAKEUP[`${year}-${month}`];
  if(mk)Object.entries(mk).forEach(([d,v])=>{r[parseInt(d)]=v;});
  return r;
}

const WD_MAP={'星期一':1,'星期二':2,'星期三':3,'星期四':4,'星期五':5,'星期六':6,'星期日':7};

function parseSchedule(){
  const raw=document.getElementById('paste-area').value;
  const hasTabs=raw.includes('\t');

  let sched;
  try{
    sched=hasTabs?parseTabs(raw):parseConcatenated(raw);
  }catch(e){
    setStatus('❌ '+e.message,'err');
    return;
  }
  if(!sched||!sched.employees.length){
    setStatus('❌ 找不到員工資料，請確認從 Excel 直接複製（含 Tab）','err');
    return;
  }
  schedule=sched;
  renderCalendar();
}

function parseTabs(raw){
  const rows=raw.split(/\r?\n/).map(r=>r.split('\t'));

  // Extract month/year/totalDays
  let month,year,totalDays;
  for(const row of rows){
    const flat=row.join('');
    const m1=flat.match(/(\d+)月[－\-](\d{4})/);
    if(m1){month=parseInt(m1[1]);year=parseInt(m1[2]);}
    const m2=flat.match(/總天數(\d+)/);
    if(m2)totalDays=parseInt(m2[1]);
    if(month&&totalDays)break;
  }
  if(!month||!totalDays)throw new Error('找不到月份或天數，請確認表頭完整');

  // Find weekday header row to determine firstDayWeekday
  let firstDayWeekday=1;
  let dataStartCol=4;
  for(const row of rows){
    const idx=row.findIndex(c=>WD_MAP[c.trim()]);
    if(idx>=0){
      firstDayWeekday=WD_MAP[row[idx].trim()];
      dataStartCol=idx;
      break;
    }
  }

  // Find employee rows
  const employees=[];
  const cnRe=/^[\u4e00-\u9fff]{2,4}$/;
  const enRe=/^[A-Za-z]{2,}$/;
  for(const row of rows){
    if(row.length<dataStartCol+1)continue;
    // Try to find name cols: scan for Chinese + English adjacent pair
    let ci=-1;
    for(let i=0;i<Math.min(row.length-1,dataStartCol);i++){
      if(cnRe.test(row[i].trim())&&enRe.test((row[i+1]||'').trim())&&row[i].trim()!=='姓名'){ci=i;break;}
    }
    if(ci<0)continue;
    const chn=row[ci].trim();
    const eng=row[ci+1].trim();
    // attendance from dataStartCol to dataStartCol+totalDays
    const attendance=[];
    for(let d=0;d<totalDays;d++){
      const v=(row[dataStartCol+d]||'').trim();
      attendance.push(v&&v!=='0'?1:0);
    }
    employees.push({chn,eng,attendance});
  }

  return{month,year,totalDays,firstDayWeekday,employees};
}

function parseConcatenated(raw){
  // Extract month/year
  const m1=raw.match(/(\d+)月[－\-](\d{4})/);
  const m2=raw.match(/總天數(\d+)/);
  if(!m1||!m2)throw new Error('找不到月份/天數。此格式沒有 Tab，無法判斷每日出勤。請從 Excel 直接複製。');
  const month=parseInt(m1[1]),year=parseInt(m1[2]),totalDays=parseInt(m2[1]);

  // Try to find firstDayWeekday from first 星期X in header
  const wdMatch=raw.match(/英文名(星期[一二三四五六日])/);
  const firstDayWeekday=wdMatch?WD_MAP[wdMatch[1]]:1;

  // Extract employee blocks: find Chinese name + English name + 12點半 sequences
  // Format: ...OK{中文}{英文}(12點半|){N}...
  const empRe=/(OK)?([\u4e00-\u9fff]{2,4})([A-Za-z]{2,})((?:12點半)*)/g;
  const employees=[];
  let match;
  while((match=empRe.exec(raw))!==null){
    const chn=match[2],eng=match[3];
    if(chn==='姓名'||chn==='英文名'||chn==='出勤人')continue;
    const workCount=(match[4].match(/12點半/g)||[]).length;
    // Without tabs we can't know WHICH days — fill placeholder
    const attendance=new Array(totalDays).fill(0);
    // Mark last N days? Not reliable. Flag as incomplete.
    employees.push({chn,eng,attendance,incomplete:true,workCount});
  }
  if(employees.some(e=>e.incomplete)){
    throw new Error('偵測到純文字格式（無 Tab）— 無法判斷每日出勤位置。\n請從 Excel 直接框選複製，不要先貼到記事本。');
  }
  return{month,year,totalDays,firstDayWeekday,employees};
}

function setStatus(msg,cls=''){
  const el=document.getElementById('status');
  el.className=cls;
  el.textContent=msg;
}
function goBack(){
  document.getElementById('view-cal').style.display='none';
  document.getElementById('view-input').style.display='';
}

let schedule=null;

function renderCalendar(){
  const{month,year,totalDays,firstDayWeekday,employees}=schedule;
  document.getElementById('view-input').style.display='none';
  document.getElementById('view-cal').style.display='';
  document.getElementById('cal-title').textContent=`${year} 年 ${month} 月出勤表`;

  const counts=Array.from({length:totalDays},(_,d)=>employees.reduce((s,e)=>s+e.attendance[d],0));
  const avg=(counts.reduce((a,b)=>a+b,0)/totalDays).toFixed(1);
  document.getElementById('stats').innerHTML=
    `<div class="stat">平均 <b>${avg}</b> 人/天</div>`+
    `<div class="stat">最多 <b>${Math.max(...counts)}</b> 人</div>`+
    `<div class="stat">最少 <b>${Math.min(...counts)}</b> 人</div>`;

  const meta=getHolidayMeta(year,month);
  const today=new Date();
  const todayIdx=(today.getFullYear()===year&&today.getMonth()===month-1)?today.getDate()-1:-1;

  const cal=document.getElementById('cal');
  cal.innerHTML='';
  ['一','二','三','四','五','六','日'].forEach((h,i)=>{
    const d=document.createElement('div');d.className='cal-hdr'+(i>=5?' wk':'');d.textContent=h;cal.appendChild(d);
  });
  for(let i=0;i<firstDayWeekday-1;i++){const e=document.createElement('div');e.className='day empty';cal.appendChild(e);}

  for(let d=0;d<totalDays;d++){
    const count=counts[d];
    const hm=meta[d+1];
    const isToday=d===todayIdx;
    const wdIdx=(firstDayWeekday-1+d)%7; // 0=Mon..6=Sun
    const isWknd=wdIdx>=5&&!hm;

    let cls='day';
    if(isToday)cls+=' t-today';
    else if(hm){cls+=hm.t==='h'?' t-hol':hm.t==='m'?' t-mkup':' t-special';}
    else if(isWknd)cls+=' t-wknd';

    let lbl='';
    if(hm){const lc=hm.t==='h'?'h':hm.t==='m'?'m':'s';lbl+=`<div class="hlbl ${lc}">${hm.l}</div>`;}
    if(isToday)lbl+=`<div class="hlbl td">今日</div>`;

    const cell=document.createElement('div');
    cell.className=cls;
    const barClr=count>=Math.ceil(employees.length*0.6)?'#378ADD':'#B5D4F4';
    cell.innerHTML=`<div class="dn">${d+1}</div>${lbl}<div class="dcnt">${count} 人</div><div class="dbar" style="background:${barClr}"></div>`;
    cell.onclick=(idx=>()=>selectDay(idx,cell))(d);
    cal.appendChild(cell);
  }

  document.getElementById('detail').innerHTML='<div class="empty-st">點選日期查看當天出勤人員</div>';
  if(todayIdx>=0){
    setTimeout(()=>{
      const cells=[...document.querySelectorAll('.day:not(.empty)')];
      if(cells[todayIdx])selectDay(todayIdx,cells[todayIdx]);
    },80);
  }
}

function selectDay(idx,cell){
  document.querySelectorAll('.day').forEach(c=>c.classList.remove('sel'));
  cell.classList.add('sel');
  const{month,year,firstDayWeekday,employees}=schedule;
  const hm=getHolidayMeta(year,month)[idx+1];
  const today=new Date();
  const isToday=today.getFullYear()===year&&today.getMonth()===month-1&&today.getDate()===idx+1;
  const wdNames=['一','二','三','四','五','六','日'];
  const wdIdx=(firstDayWeekday-1+idx)%7;
  const wd=wdNames[wdIdx];
  const isWknd=wdIdx>=5;
  const present=employees.filter(e=>e.attendance[idx]===1);
  const count=present.length;

  let badges='';
  if(isToday)badges+=`<span class="badge bt">今日</span>`;
  if(hm){const bc=hm.t==='h'?'bh':hm.t==='m'?'bm':'bs';badges+=`<span class="badge ${bc}">${hm.l}</span>`;}
  else if(isWknd)badges+=`<span class="badge bw">週末</span>`;

  const cards=present.map((p,i)=>{
    const c=AV_PAL[i%AV_PAL.length];
    return`<div class="pcard"><div class="av" style="background:${c.bg};color:${c.tc}">${p.chn.slice(-1)}</div><div><div class="pn">${p.chn}</div><div class="pe">${p.eng}</div></div></div>`;
  }).join('');

  document.getElementById('detail').innerHTML=
    `<div class="dtitle">${month} 月 ${idx+1} 日（星期${wd}）${badges}<span style="margin-left:auto;font-size:14px;font-weight:400;color:var(--color-text-secondary)">共 ${count} 人</span></div>`+
    `<div class="pgrid">${cards}</div>`;
}
</script>
