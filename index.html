<script>

var FIXED={'1-1':{t:'h',l:'元旦'},'2-14':{t:'s',l:'情人節'},'2-28':{t:'h',l:'和平紀念日'},'3-8':{t:'s',l:'婦女節'},'4-4':{t:'h',l:'兒童節'},'5-1':{t:'h',l:'勞動節'},'8-8':{t:'s',l:'父親節'},'9-28':{t:'s',l:'教師節'},'10-10':{t:'h',l:'國慶日'},'12-24':{t:'s',l:'平安夺'},'12-25':{t:'h',l:'聖誤/行憲'},'12-31':{t:'s',l:'跨年夺'}};

var LUNAR={2025:{'1-27':{t:'h',l:'除夕'},'1-28':{t:'h',l:'初一'},'1-29':{t:'h',l:'初二'},'1-30':{t:'h',l:'初三'},'1-31':{t:'h',l:'初四'},'5-31':{t:'h',l:'端午節'},'10-6':{t:'h',l:'中秋節'}},2026:{'2-16':{t:'h',l:'除夕'},'2-17':{t:'h',l:'初一'},'2-18':{t:'h',l:'初二'},'2-19':{t:'h',l:'初三'},'2-20':{t:'h',l:'初四'},'2-21':{t:'h',l:'初五'},'6-19':{t:'h',l:'端午節'},'9-25':{t:'h',l:'中秋節'}},2027:{'2-5':{t:'h',l:'除夕'},'2-6':{t:'h',l:'初一'},'2-7':{t:'h',l:'初二'},'2-8':{t:'h',l:'初三'},'2-9':{t:'h',l:'初四'},'2-10':{t:'h',l:'初五'},'5-20':{t:'h',l:'端午節'},'10-3':{t:'h',l:'中秋節'}}};
var MAKEUP={'2026-4':{'3':{t:'m',l:'兒童節補假'},'6':{t:'m',l:'清明補假'}},'2026-10':{'9':{t:'m',l:'國慶補假'}},'2025-1':{'31':{t:'m',l:'元旦補假'}}};
var QIXI={2025:[8,29],2026:[8,19],2027:[8,9]};
var WDMAP={'星期一':1,'星期二':2,'星期三':3,'星期四':4,'星期五':5,'星期六':6,'星期日':7};
function nthSun(y,m,n){var d=new Date(y,m-1,1);while(d.getDay()!==0)d.setDate(d.getDate()+1);d.setDate(d.getDate()+(n-1)*7);return d.getDate();}
function holMeta(y,m){var r={};Object.keys(FIXED).forEach(function(k){var p=k.split('-');if(+p[0]===m)r[+p[1]]=FIXED[k];});if(m===4&&QINGMING[y]&&!r[QINGMING[y]])r[QINGMING[y]]={t:'h',l:'清明節'};if(m===5){var ms=nthSun(y,5,2);if(!r[ms])r[ms]={t:'s',l:'母親節'};}if(QIXI[y]&&QIXI[y][0]===m&&!r[QIXI[y][1]])r[QIXI[y][1]]={t:'s',l:'七夕情人節'};var ly=LUNAR[y];if(ly)Object.keys(ly).forEach(function(k){var p=k.split('-');if(+p[0]===m)r[+p[1]]=ly[k];});var mk=MAKEUP[y+'-'+m];if(mk)Object.keys(mk).forEach(function(d){r[+d]=mk[d];});return r;}
function parseSched(raw){
  var hasTabs=(raw.indexOf('\t')>=0);
  var m1=raw.match(/(\d{1,2})\u6708.{0,3}(\d{4})/);
  if(!m1)throw '\u627e\u4e0d\u5230\u6708\u4efd\u5e74\u4efd';
  var m2=raw.match(/\u7e3d\u5929\u6578\D{0,2}(\d+)/),totalDays=m2?+m2[1]:0;
  if(!totalDays){var dms=raw.match(/\d+\u6708(\d+)\u65e5/g)||[];dms.forEach(function(s){var n=+s.match(/\u6708(\d+)\u65e5/)[1];if(n>totalDays)totalDays=n;});}
  if(!totalDays)throw '\u627e\u4e0d\u5230\u7e3d\u5929\u6578';
  var month=+m1[1],year=+m1[2],fdw=1,emps=[],partial=false;
  if(hasTabs){
    var rows=raw.split(/\r?\n/).map(function(r){return r.split('\t');});
    var dsc=-1;
    for(var ri=0;ri<rows.length&&dsc<0;ri++)for(var ci=0;ci<rows[ri].length;ci++)if(WDMAP[rows[ri][ci].trim()]){fdw=WDMAP[rows[ri][ci].trim()];dsc=ci;break;}
    if(dsc<0)dsc=4;
    var cnRe=/^[\u4e00-\u9fff]{2,5}$/,enRe=/^[A-Za-z]{2,15}$/;
    for(var ri2=0;ri2<rows.length;ri2++){
      var row=rows[ri2],hasW=false;
      for(var x=0;x<row.length;x++)if(row[x].trim()==='12\u9ede\u534a'){hasW=true;break;}
      if(!hasW)continue;
      var ci2=-1;
      for(var i=0;i<Math.min(row.length-1,10);i++)if(cnRe.test(row[i].trim())&&enRe.test((row[i+1]||'').trim())&&row[i].trim()!=='\u59d3\u540d'){ci2=i;break;}
      if(ci2<0)continue;
      var attStart=(ci2+2>dsc)?ci2+2:dsc,att=[];
      for(var d=0;d<totalDays;d++)att.push((row[attStart+d]||'').trim()?1:0);
      if(att.indexOf(1)>=0)emps.push({chn:row[ci2].trim(),eng:row[ci2+1].trim(),att:att,wkCount:0});
    }
    if(!emps.length)throw '\u627e\u4e0d\u5230\u54e1\u5de5\u8cc7\u6599\uff08Tab\u683c\u5f0f\uff09';
  }else{
    partial=true;
    var wdm=raw.match(/\u82f1\u6587\u540d(\u661f\u671f[\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u65e5])/);if(wdm)fdw=WDMAP[wdm[1]]||1;
    var er=/(WH\d+\s*)?(OK)([\u4e00-\u9fff]{2,5})([A-Za-z]{2,15})((?:12\u9ede\u534a)*)/g,em;
    while((em=er.exec(raw))!==null)if(em[3]!=='\u59d3\u540d')emps.push({chn:em[3],eng:em[4],att:null,wkCount:em[5].split('12\u9ede\u534a').length-1});
    if(!emps.length)throw '\u627e\u4e0d\u5230\u54e1\u5de5\u8cc7\u6599';
  }
  return{month:month,year:year,totalDays:totalDays,fdw:fdw,emps:emps,partial:partial};
}
var SC=null,selP=null,selD=null;

function setst(msg,cls){var e=el('st');e.className=cls||'';e.textContent=msg;}
function go(){
  var raw=(el('pa').value||'').trim();
  if(!raw){setst('\u8acb\u5148\u8cbc\u5165\u73ed\u8868\u8cc7\u6599','err');return;}
  el('gobtn').disabled=true;

  SC=sched;selP=null;selD=null;

  el('gobtn').disabled=false;
}
function back(){el('vc').style.display='none';el('vi').style.display='';selP=null;selD=null;}

  el('vi').style.display='none';el('vc').style.display='block';

  el('ctitle').textContent=S.year+'\u5e74'+S.month+'\u6708\u51fa\u52e4\u8868';

  if(!S.partial){var cnts=[];for(var d=0;d<S.totalDays;d++)cnts.push(S.emps.reduce(function(s,e){return s+e.att[d];},0));var avg=(cnts.reduce(function(a,b){return a+b;},0)/S.totalDays).toFixed(1);el('pills').innerHTML='<div class="pill">\u5e73\u5747 <b>'+avg+'</b> \u4eba</div><div class="pill">\u6700\u591a <b>'+Math.max.apply(null,cnts)+'</b></div><div class="pill">\u6700\u5c11 <b>'+Math.min.apply(null,cnts)+'</b></div>';}else{el('pills').innerHTML='';}

  if(!S.partial){var td=new Date(),ti=(td.getFullYear()===S.year&&td.getMonth()===S.month-1)?td.getDate()-1:-1;if(ti>=0)setTimeout(function(){var cs=document.querySelectorAll('.day:not(.emp)');if(cs[ti])clickDay(ti,cs[ti]);},80);}
}
function buildChips(){

  });
}
function buildGrid(){
  var S=SC,hm=holMeta(S.year,S.month),td=new Date(),ti=(td.getFullYear()===S.year&&td.getMonth()===S.month-1)?td.getDate()-1:-1;
  var cal=el('cal');cal.innerHTML='';
  ['\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d','\u65e5'].forEach(function(h,i){var d=document.createElement('div');d.className='gh'+(i>=5?' wk':'');d.textContent=h;cal.appendChild(d);});
  for(var e=0;e<S.fdw-1;e++){var ec=document.createElement('div');ec.className='day emp';cal.appendChild(ec);}
  var cnts=S.partial?null:[];
  if(!S.partial)for(var dc=0;dc<S.totalDays;dc++)cnts.push(S.emps.reduce(function(s,e){return s+e.att[dc];},0));
  for(var d=0;d<S.totalDays;d++){
    var meta=hm[d+1],isT=(d===ti),wdi=(S.fdw-1+d)%7,isW=(wdi>=5&&!meta);
    var cls='day';
    if(isT)cls+=' tod';else if(meta)cls+=(meta.t==='h'?' hol':meta.t==='m'?' mkup':' spc');else if(isW)cls+=' wknd';
    if(selP!==null&&!S.partial)cls+=(S.emps[selP].att[d]?' pon':' poff');
    if(selD===d)cls+=' sel';
    var lbl=meta?'<div class="hlb">'+meta.l+'</div>':'';if(isT)lbl+='<div class="hlb">\u4eca\u65e5</div>';
    var dots=S.partial?'':S.emps.map(function(emp,i){return emp.att[d]?'<div class="dot" style="background:'+PAL[i%PAL.length].av+';"></div>':'';}).join('');
    var cntH=cnts?'<div class="dfoot">'+cnts[d]+' \u4eba</div>':'';
    var cell=document.createElement('div');cell.className=cls;
    cell.innerHTML='<div class="dn">'+(d+1)+'</div>'+lbl+'<div class="dots">'+dots+'</div>'+cntH;
    if(!S.partial)(function(idx,c){c.onclick=function(){if(selP===null)clickDay(idx,c);};})(d,cell);
    cal.appendChild(cell);
  }
}
function clickChip(idx){
  if(selP===idx){selP=null;document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');c.style.borderColor='';});buildGrid();el('panel').innerHTML='<div class="est">\u9ede\u9078\u65e5\u671f\u6216\u4eba\u54e1\u67e5\u770b\u51fa\u52e4\u660e\u7d30</div>';return;}
  selP=idx;selD=null;var c=PAL[idx%PAL.length];
  document.querySelectorAll('.chip').forEach(function(ch,i){ch.classList.toggle('on',i===idx);ch.style.borderColor=(i===idx)?c.av:'';});
  buildGrid();showPersonPanel(idx);
}
function clickDay(di,cell){selD=di;document.querySelectorAll('.day').forEach(function(c){c.classList.remove('sel');});cell.classList.add('sel');showDayPanel(di);}
function showDayPanel(idx){
  var S=SC,hm=holMeta(S.year,S.month)[idx+1],td=new Date(),isT=(td.getFullYear()===S.year&&td.getMonth()===S.month-1&&td.getDate()===idx+1);
  var wdn=['\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d','\u65e5'],wdi=(S.fdw-1+idx)%7,isW=(wdi>=5);
  var present=S.emps.filter(function(e){return e.att&&e.att[idx]===1;});
  var badges=isT?'<span class="bdg bt">\u4eca\u65e5</span>':'';
  if(hm)badges+='<span class="bdg '+(hm.t==='h'?'bh':hm.t==='m'?'bm':'bs')+'">'+hm.l+'</span>';
  else if(isW)badges+='<span class="bdg bw">\u9031\u672b</span>';
  var cards=present.map(function(p){var ei=S.emps.indexOf(p);var c=PAL[ei%PAL.length];return'<div class="pc"><div class="pav" style="background:'+c.av+';color:#fff">'+p.chn.slice(-1)+'</div><div><div class="pcn">'+p.chn+'</div><div class="pen">'+p.eng+'</div></div></div>';}).join('');
  el('panel').innerHTML='<div class="ptitle">'+S.month+'\u6708'+(idx+1)+'\u65e5\uff08\u661f\u671f'+wdn[wdi]+'\uff09'+badges+'<span style="margin-left:auto;font-size:12px;font-weight:400;color:#6B7A99">\u5171'+present.length+'\u4eba</span></div><div class="pgrid">'+cards+'</div>';
}
function showPersonPanel(idx){
  var S=SC,emp=S.emps[idx],c=PAL[idx%PAL.length];
  var wk=S.partial?emp.wkCount:emp.att.reduce(function(s,v){return s+v;},0);
  var wdn=['\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d','\u65e5'];
  var tags=S.partial?'':emp.att.map(function(v,d){if(!v)return'';return'<span class="pdtag" style="background:'+c.av+'">'+(d+1)+'('+wdn[(S.fdw-1+d)%7]+')</span>';}).join('');
  el('panel').innerHTML='<div class="psh"><div class="psav" style="background:'+c.av+';color:#fff">'+emp.chn.slice(-1)+'</div><div><div class="psn">'+emp.chn+'</div><div class="pse">'+emp.eng+'</div></div><div class="pss"><div class="ps"><div class="psnum" style="color:'+c.av+'">'+wk+'</div><div class="pslb">\u51fa\u52e4\u5929\u6578</div></div><div class="ps"><div class="psnum">'+(S.totalDays-wk)+'</div><div class="pslb">\u4f11\u5047\u5929\u6578</div></div></div></div>'+(S.partial?'<div class="warn">\u7d14\u6587\u5b57\u683c\u5f0f\u7121\u6cd5\u986f\u793a\u6bcf\u65e5\u51fa\u52e4\u65e5</div>':'<div class="pdlbl">'+S.month+'\u6708\u51fa\u52e4\u65e5</div><div class="pdlist">'+tags+'</div>');
}
</script>
</body>
</html>
